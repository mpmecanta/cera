<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직업훈련교사 자격교육 종합 CBT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .option-card:hover:not(:disabled) { background-color: #ebf5ff; border-color: #3b82f6; }
        .option-selected { background-color: #3b82f6 !important; color: white; border-color: #2563eb; }
        #review-area { scroll-margin-top: 2rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px] flex flex-col">
        <div id="home-screen" class="p-8 flex-1">
            <h1 class="text-3xl font-bold text-center text-blue-700 mb-2">직업훈련교사 CBT 종합 평가</h1>
            <p class="text-center text-gray-500 mb-8">온라인 1~6과목 전체 126문제 완벽 수록</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <button onclick="startMockExam()" class="flex flex-col items-center justify-center p-8 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-all shadow-lg transform hover:-translate-y-1 h-full">
                    <div class="text-4xl mb-4">🏆</div>
                    <div class="text-2xl font-bold mb-2">종합 모의고사 시작</div>
                    <div class="text-sm opacity-90 text-center">전체 126문제 중 랜덤 40문제 출제<br>60점 (24문제) 이상 합격<br><span class="text-xs text-blue-200 mt-1 inline-block">(※ 모의고사는 마지막에 일괄 채점됩니다)</span></div>
                </button>
                <div class="space-y-3 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <p class="text-lg font-bold text-gray-700 mb-2 border-b pb-2">과목별 집중 학습 (5문제 랜덤)</p>
                    <p class="text-xs text-green-600 font-bold mb-4">✔ 문제마다 즉시 정답과 해설 확인 가능</p>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="startCategoryQuiz(1)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">1과목. 학습자 이해와 능력개발</button>
                        <button onclick="startCategoryQuiz(2)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">2과목. 직업훈련교사의 책무와 역량</button>
                        <button onclick="startCategoryQuiz(3)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">3과목. 수업 설계 전략 입문</button>
                        <button onclick="startCategoryQuiz(4)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">4과목. 수업설계의 이해</button>
                        <button onclick="startCategoryQuiz(5)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">5과목. 직훈교사로서의 생애설계</button>
                        <button onclick="startCategoryQuiz(6)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">6과목. 훈련생 이해 및 상담 이론</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="hidden flex-1 flex flex-col">
            <div class="bg-gray-100 p-4 flex justify-between items-center border-b">
                <span id="quiz-title" class="font-bold text-blue-800">시험 중</span>
                <span id="quiz-progress" class="text-sm font-bold bg-white px-3 py-1 rounded-full shadow-sm text-blue-600">1 / 40</span>
            </div>
            <div class="w-full bg-gray-200 h-2">
                <div id="progress-bar" class="bg-blue-500 h-2 transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="p-8 flex-1 flex flex-col">
                <div id="question-text" class="text-xl md:text-2xl font-bold mb-8 text-gray-800 min-h-[60px]">문제가 로딩 중입니다.</div>
                
                <div id="options-container" class="space-y-3 mb-6">
                    </div>

                <div id="explanation-area" class="hidden mb-6 p-5 bg-[#f0fdf4] border border-[#86efac] rounded-xl shadow-sm">
                    <div class="font-bold text-green-800 mb-2 flex items-center">
                        <span class="mr-2">💡</span> 정답 및 해설
                    </div>
                    <p id="explanation-text" class="text-green-900 text-sm md:text-base leading-relaxed font-medium"></p>
                </div>

                <div class="flex justify-between mt-auto pt-6 border-t border-gray-100">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-5 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed">이전 문제</button>
                    <div class="flex gap-2">
                        <button id="check-ans-btn" onclick="checkAnswer()" class="hidden px-6 py-3 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-colors">정답 확인</button>
                        <button id="next-btn" onclick="nextQuestion()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md transition-colors">다음 문제</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden p-8 text-center flex-1">
            <div id="result-badge" class="w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner">
                🏆
            </div>
            <h2 id="result-status" class="text-3xl font-bold mb-2">결과</h2>
            <div id="result-score" class="text-6xl font-extrabold text-blue-600 mb-4 tracking-tighter">00점</div>
            <div id="result-detail" class="text-gray-500 text-lg mb-8 font-medium">40문제 중 0문제를 맞히셨습니다.</div>
            
            <div class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
                <button onclick="location.reload()" class="flex-1 py-4 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 shadow-md transition-colors">초기화 및 홈으로</button>
                <button onclick="toggleReview()" class="flex-1 py-4 bg-blue-100 text-blue-800 rounded-xl font-bold hover:bg-blue-200 shadow-md transition-colors">상세 오답 노트</button>
            </div>

            <div id="review-area" class="mt-12 hidden text-left bg-gray-50 p-6 rounded-2xl">
                <h3 class="text-2xl font-bold border-b border-gray-200 pb-4 mb-6 flex items-center">
                    <span class="mr-2">📝</span> 전체 문항 해설
                </h3>
                <div id="review-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // 126문제 전체 DB
        const questionData = [
            // 1과목 (18문제)
            { cat: 1, q: "다음 중 성인학습의 특징과 가장 거리가 먼 것은 무엇인가?", a: ["자기주도성", "경험의 활용", "사회적 역할의 반영", "외적동기"], c: 3, r: "외적동기보다 내적동기가 성인학습의 주요 특징입니다." },
            { cat: 1, q: "레빈슨의 생애구조 발달이론에서 중년 전환기의 4대 과제가 아닌 것은 무엇인가?", a: ["젊음(Young)과 노년(Old)", "파괴(Destruction)와 창조(Creation)", "친밀감(Intimacy)과 고립감(Isolation)", "남성성(Masculine)과 여성성(Feminine)"], c: 2, r: "친밀감과 고립감은 에릭슨의 이론에 해당합니다." },
            { cat: 1, q: "다음 중 인간의 삶을 일련의 발달과업을 수행하는 과정으로 본 이론은 무엇인가?", a: ["헤비거스트(Havighurst)의 발달과업이론", "에릭슨(Erikson)의 심리사회적 발달이론", "레빈슨(Levinson)의 생애구조 발달이론", "수퍼(Super)의 진로발달이론"], c: 0, r: "헤비거스트의 이론입니다." },
            { cat: 1, q: "다음 중 성인학습자의 인지적 특성의 구체적 양상과 가장 거리가 먼 것은 무엇인가?", a: ["성취욕과 자기효능감", "경험기반의 지식 구조", "문제해결 중심의 인지 처리", "인지적 편향과 확증편향"], c: 0, r: "성취욕과 자기효능감은 정서적 특성에 속합니다." },
            { cat: 1, q: "하울(Houle)이 분류한 성인학습자의 교육참여 동기 유형에 해당되지 않는 것은 무엇인가?", a: ["목표지향형", "사회지향형", "활동지향형", "학습지향형"], c: 1, r: "사회지향형은 해당되지 않습니다." },
            { cat: 1, q: "김씨는 새로운 사람들과 어울리며 시간을 보내고 싶어 지역 평생학습관의 노래교실에 등록했다. 이 경우 학습참여 유형은 무엇인가?", a: ["사회지향형", "학습지향형", "목표지향형", "활동지향형"], c: 3, r: "활동 자체(친목 등)를 목적으로 하는 활동지향형입니다." },
            { cat: 1, q: "스캐너(스키너)의 조작적 조건형성과 가장 직접적으로 관련된 개념은 무엇인가?", a: ["강화와 결과", "동화와 조절", "자기효능감", "근접발달영역(ZPD)"], c: 0, r: "행동의 결과와 그에 따른 강화가 조작적 조건형성의 핵심입니다." },
            { cat: 1, q: "매슬로우 이론에서 '자아실현'은 어떤 개념을 의미하는가?", a: ["생리적 욕구 충족", "사회적 관계 강화", "잠재력의 최대 실현", "외적 보상을 통한 동기 강화"], c: 2, r: "자아실현은 개인 잠재력의 최대 실현을 의미합니다." },
            { cat: 1, q: "가네(Gagne)의 9가지 수업사태에 포함되지 않는 단계는 무엇인가?", a: ["주의집중", "수행 유도", "학습 분위기 조성", "파지와 전이 증진"], c: 2, r: "학습 분위기 조성은 가네의 9가지 사태에 명시적으로 포함되지 않습니다." },
            { cat: 1, q: "자기주도학습(SDL)의 핵심 특징은 무엇인가?", a: ["외적 보상 중심 학습", "학습자의 전 과정을 자율적으로 설계하고 관리", "교사의 일방적 지시", "단기 훈련 중심"], c: 1, r: "학습자가 스스로 학습의 전 과정을 주도하는 것이 핵심입니다." },
            { cat: 1, q: "메지로우(Mezirow)의 전환학습에서 '혼란스러운 계기(disorienting dilemma)'의 역할은 무엇인가?", a: ["학습의 마무리 단계이다.", "기존 관점을 촉발, 도전하여 성찰을 유도하는 출발점이다.", "단순한 정보 제공에 해당한다.", "외적 보상을 제공한다."], c: 1, r: "기존 관점에 대한 도전을 통해 성찰을 유발합니다." },
            { cat: 1, q: "Kolb의 경험학습 순환에서 '반성적 성찰(Reflective Observation)'에 해당하는 활동은 무엇인가?", a: ["새 전략을 직접 적용해 보는 것", "실습 후 결과를 되돌아보며 이유를 분석하는 것", "이론을 암기하는 것", "즉시 반복 훈련하는 것"], c: 1, r: "경험을 돌아보고 의미를 분석하는 과정입니다." },
            { cat: 1, q: "성인 훈련생의 학습 동기 특징으로 가장 적절한 것은 무엇인가?", a: ["외부 보상 중심", "경험보다 지식의 양을 중시", "학습 목적이 실용적이고 문제 중심적", "타인의 평가가 동기 형성에 절대적"], c: 2, r: "실생활 문제 해결과 실용성을 중시합니다." },
            { cat: 1, q: "내재적 동기의 예로 가장 적절한 것은 무엇인가?", a: ["승진을 위한 자격증 취득", "상여금 지급", "지식 탐구 자체에서 얻는 즐거움", "조직의 교육 이수 요구"], c: 2, r: "학습 내용 자체에 대한 즐거움과 호기심이 내재적 동기입니다." },
            { cat: 1, q: "Hoile(Houle)의 목표지향형 훈련생은 어떤 특성을 보이는가?", a: ["사교적 만남을 위해 학습함", "지적 호기심 충족이 핵심 목적임", "스트레스 해소를 위한 도피 활동", "특정 목표 달성을 위해 학습에 참여함"], c: 3, r: "뚜렷한 목적(자격증, 학위 등) 달성을 위해 학습합니다." },
            { cat: 1, q: "진로, 직업상담형의 핵심 목적은 무엇인가?", a: ["훈련생의 정서 안정 지원", "장기적 경력 방향과 전환 경로 설계", "훈련생의 시간 관리 지도", "학습 동기 강화"], c: 1, r: "경력 경로와 직업 선택에 초점을 맞춥니다." },
            { cat: 1, q: "학습 전략, 메타인지 상담형에 가장 적합한 주제는 무엇인가?", a: ["정서적 지지 제공", "미래 경력 비전 찾기", "공부법과 자기 조절 전략 점검", "갈등 조정"], c: 2, r: "효과적인 학습 방법과 전략을 점검합니다." },
            { cat: 1, q: "심리, 정서 조절 상담형의 주요 목표는 무엇인가?", a: ["직업능력 향상", "불안, 스트레스 관리", "자격증 취득", "실습계획 수립"], c: 1, r: "정서적 문제와 스트레스 해소에 주력합니다." },

            // 2과목 (18문제)
            { cat: 2, q: "직업훈련교사의 역할 중 운영자(Facilitator)에 해당하는 활동은 무엇인가?", a: ["훈련 목표 수립", "이론, 실습 수행 진행", "직무 분석 수행", "프로그램 전체 평가"], c: 1, r: "설계된 교육을 실행하고 촉진하는 역할입니다." },
            { cat: 2, q: "직업훈련교사의 사회적 책무에 대한 설명으로 가장 적절한 것은 무엇인가?", a: ["개별 훈련생의 학습권만 보장하면 된다.", "사회, 산업 변화와는 무관하게 교육 내용을 유지한다.", "취약계층의 역량 향상을 통해 사회적 포용에 기여한다.", "산업체 요구보다 교육기관 내부 규정만 우선한다."], c: 2, r: "사회 전체의 역량 향상과 취약계층 포용에 기여해야 합니다." },
            { cat: 2, q: "직업훈련교사의 윤리적 책임으로 적절하지 않은 것은?", a: ["평가의 공정성 유지", "실습 안전 확보", "직무와 관련없는 개인적 신념 강요", "훈련생의 다양성 존중"], c: 2, r: "개인적 신념 강요는 비윤리적 행위입니다." },
            { cat: 2, q: "다음 중 '역량(Competency)'의 구성요소로 가장 적절한 것은 무엇인가?", a: ["지식, 기술, 태도, 행동", "지식, 나이, 학력, 경력", "열정, 창의력, 도전정신", "기술, 급여, 경력, 경쟁률"], c: 0, r: "역량은 지식, 기술, 태도, 행동으로 구성됩니다." },
            { cat: 2, q: "다음 중 직업훈련교사에게 필요한 30개 역량 중 '훈련 요구분석 능력'이 위치하는 곳은 무엇인가?", a: ["산업, 기술 역량", "교육과정 설계, 개발 역량", "교수, 학습 역량", "조직 운영 역량"], c: 1, r: "훈련요구분석은 교육과정 설계/개발의 핵심 절차입니다." },
            { cat: 2, q: "3급에서 2급 성장 과정의 특징으로 가장 적절한 것은 무엇인가?", a: ["실습 중심에서 정책 중심으로 변화", "기술 중심에서 교육학, 평가 중심으로 변화", "기관 운영 중심에서 강의 중심으로 변화", "전략 중심에서 현장 중심으로 변화"], c: 1, r: "상위 등급으로 갈수록 교육학 및 평가 역량이 중요해집니다." },
            { cat: 2, q: "자기역량 진단이란 무엇을 의미하는가?", a: ["교사의 성과를 외부 전문가가 평가하는 과정", "교사의 개인적 특성과 태도를 종합적으로 평가하는 과정", "자신의 역량 수준을 스스로 점검하고 성장을 계획하는 과정", "훈련생의 수업 만족도를 조사하는 과정"], c: 2, r: "스스로 부족한 점을 점검하고 성장을 계획하는 것입니다." },
            { cat: 2, q: "자기역량 진단이 필요한 이유로 가장 알맞은 것은 무엇인가?", a: ["교사의 연간 성과를 평가하기 위해", "수업 품질과 교수 행동을 개선하기 위해", "훈련생의 출결률을 관리하기 위해", "교재의 난이도를 조정하기 위해"], c: 1, r: "근본적 목적은 더 나은 수업을 제공하기 위함입니다." },
            { cat: 2, q: "다음 중 자기역량 진단 결과를 효과적으로 활용한 사례로 적절한 것은 무엇인가?", a: ["낮은 점수를 받은 항목을 무시하고 평균만 확인했다.", "점수가 낮은 항목을 중심으로 자기개발 계획을 세웠다.", "모든 항목이 높은 점수라 추가 학습을 중단했다.", "점수가 낮은 영역을 동료에게 대신 맡겼다."], c: 1, r: "약점을 보완하기 위한 CDP를 수립하는 것이 올바른 활용법입니다." },
            { cat: 2, q: "역량진단 점수를 활용하는 가장 적절한 목적은 무엇인가?", a: ["점수 비교를 통해 교사 간 순위를 정한다.", "점수만으로 전체 역량 수준을 단정한다.", "점수를 바탕으로 강점과 약점을 파악한다.", "점수가 낮은 사람을 선발에서 제외한다."], c: 2, r: "강점과 약점을 분석하기 위한 도구입니다." },
            { cat: 2, q: "다음 중 '평가, 피드백 역량' 부족을 해결하기 위한 실천 전략으로 가장 적절한 것은 무엇인가?", a: ["수업시연 영상 촬영", "루브릭이나 피드백 템플릿 적용", "실습실 장비 점검 강화", "훈련생 출석 체크 체계화"], c: 1, r: "객관적인 평가도구(루브릭)를 활용하는 것이 효과적입니다." },
            { cat: 2, q: "다음 중 CDP 작성 시 포함해야 할 내용으로 가장 적절한 것은 무엇인가?", a: ["교사 개인의 취미생활 계획", "수업 준비물 목록", "핵심역량 진단 요약과 개선 목표", "학생 출결 관리 방법"], c: 2, r: "역량개발계획서(CDP)에는 진단 결과 요약과 목표가 포함되어야 합니다." },
            { cat: 2, q: "교직윤리가 의미하는 바를 가장 잘 설명한 것은 무엇인가?", a: ["교사가 지켜야 할 법률 조항만을 의미한다.", "교사의 개인적 취향과 성향을 의미한다.", "교사의 행동과 판단을 이끄는 가치, 기준, 원칙을 의미한다.", "기관 운영자가 정한 규칙만을 의미한다."], c: 2, r: "교육자로서 올바른 결정을 내리게 하는 도덕적 기준입니다." },
            { cat: 2, q: "다음 중 교직윤리의 '관계적 성격'을 가장 잘 나타내는 예시는 무엇인가?", a: ["훈련생에게만 윤리를 지키면 된다.", "기관과 동료에게는 윤리가 적용되지 않는다.", "교직윤리는 훈련생, 동료, 기관, 산업체 등 다양한 관계에서 실천된다.", "윤리는 교사의 사적인 영역에만 해당한다."], c: 2, r: "교육을 둘러싼 다양한 이해관계자 모두에게 적용됩니다." },
            { cat: 2, q: "다음 중 '윤리 수준이 낮을 때' 발생하는 결과로 가장 적절한 것은 무엇인가?", a: ["공정한 평가가 이루어진다.", "훈련생의 사기와 신뢰가 저하된다.", "산업 현장에서 안전사고 위험이 줄어든다.", "피드백의 품질이 자연스럽게 향상된다."], c: 1, r: "교사에 대한 불신은 교육의 질적 저하로 직결됩니다." },
            { cat: 2, q: "다음 중 '사명감'의 일반적 의미로 가장 적절한 것은 무엇인가?", a: ["작업을 통해 경제적 보상을 얻으려는 동기", "맡은 역할을 책임있게 수행하려는 목적의식과 의무감", "특정 기술을 능숙하게 수행하는 능력", "훈련생과 친해지려는 개인적 태도"], c: 1, r: "내적인 책임감과 목적의식이 사명감입니다." },
            { cat: 2, q: "다음 중 '직업훈련교사'의 교사상에 해당하지 않는 것은 무엇인가?", a: ["지속적으로 배우는 평생훈련생", "산업과 연결하는 다리 역할", "훈련생을 방임하는 관찰자", "윤리적 행동의 본보기"], c: 2, r: "단순한 관찰자나 방임자는 올바른 교사상이 아닙니다." },
            { cat: 2, q: "사명감, 전문성, 윤리성의 관계로 가장 적절한 설명은 무엇인가?", a: ["세 요소는 서로 무관하며 따로 개발해도 된다.", "윤리성만 있으면 전문성은 필요 없다.", "전문성, 윤리성, 사명감은 서로 영향을 주며 교사의 정체성을 완성한다.", "기술만 뛰어나면 좋은 교사이다."], c: 2, r: "이 세 가지는 상호작용하여 진정한 교육 전문가를 만듭니다." },

            // 3과목 (18문제)
            { cat: 3, q: "교수설계의 주된 목적은 무엇인가?", a: ["훈련교사의 수업 편의를 높이기 위함", "학습자의 성취와 학습효과를 극대화하기 위함", "기관의 행정 효율을 향상하기 위함", "훈련비용을 절감하기 위함"], c: 1, r: "가장 효과적인 학습 성과를 이끌어내는 것이 목적입니다." },
            { cat: 3, q: "다음 중 교수설계의 핵심 요소로 볼 수 없는 것은 무엇인가?", a: ["학습자 분석", "학습목표 설정", "교수전략 설계", "교사의 근무 시간 조정"], c: 3, r: "근무 시간 조정은 행정적 영역입니다." },
            { cat: 3, q: "다음 중 '좋은 설계의 수업'에 해당하는 것은 무엇인가?", a: ["목표가 모호하고 평가와 무관하다.", "학습자 수준에 맞춘 단계별 설계를 적용한다.", "교재 순서대로 단순 강의만 진행한다.", "학습자 활동 없이 강사만 설명한다."], c: 1, r: "학습자 특성을 반영하여 체계적으로 구조화된 수업입니다." },
            { cat: 3, q: "다음 중 ADDIE 모형의 단계가 아닌 것은 무엇인가?", a: ["분석", "설계", "운영", "평가"], c: 2, r: "운영(X) -> ADDIE는 분석, 설계, 개발, 실행(I), 평가 단계로 구성됩니다." },
            { cat: 3, q: "설계 단계에서 수행해야 할 핵심 활동으로 올바른 것은 무엇인가?", a: ["평가도구 제작과 점검표 개발", "학습자의 흥미 조사", "수업시간표 편성", "수업공간 및 장비 확보"], c: 0, r: "목표 설정 및 평가 계획(도구 개발)은 설계 단계에 이루어집니다." },
            { cat: 3, q: "다음 중 ADDIE 모형의 순환적 구조를 가장 올바르게 설명한 것은 무엇인가?", a: ["다섯 단계를 순서대로 한 번만 수행한다.", "평가 결과를 다음 설계 단계로 되돌려 개선한다.", "분석과 설계 단계만 반복 수행한다.", "순환 구조는 교수자 개인 성찰에만 해당한다."], c: 1, r: "평가 후 피드백이 다음 분석으로 이어지는 지속 개선 구조입니다." },
            { cat: 3, q: "PBL에서 가장 중요한 문제 조건은 무엇인가?", a: ["하나의 정답이 존재하는 문제", "단순 계산으로 해결되는 문제", "비구조적이며 해결이 여러 가지일 수 있는 문제", "짧고 빠르게 풀 수 있는 문제"], c: 2, r: "실제적이고 정답이 하나가 아닌 비구조적 문제가 적합합니다." },
            { cat: 3, q: "PBL에서 개별 탐색의 주요 목적은 무엇인가?", a: ["교수자의 피드백을 수집하기 위해", "팀 경쟁을 유도하기 위해", "필요한 자료를 학습자가 각자 탐색하고 이해하기 위해", "발표용 문서를 만들기 위해"], c: 2, r: "팀 모임 전 자기주도적으로 학습 정보를 찾는 단계입니다." },
            { cat: 3, q: "직업훈련에서 PBL을 적용할 때 교수자의 역할로 가장 적합한 것은 무엇인가?", a: ["해결안을 직접 제시해 학습자의 부담을 줄인다.", "학습자의 문제 분석을 돕고 사고를 촉진하는 질문을 제공한다.", "팀 활동에 개입하지 않기 위해 관찰만 한다.", "팀간 점수를 즉시 비교해 경쟁을 강화한다."], c: 1, r: "지시자가 아닌 학습 촉진자(Facilitator)의 역할을 합니다." },
            { cat: 3, q: "메타인지의 개념으로 가장 적절한 것은 무엇인가?", a: ["학습 내용을 암기하는 능력", "학습 과정에서 자신의 사고를 점검하고 조절하는 능력", "지식을 빠르게 검색하는 능력", "타인의 학습을 지도하는 능력"], c: 1, r: "자신의 생각과 학습 과정을 인지하고 제어하는 능력입니다." },
            { cat: 3, q: "학습 중 '지금 전략이 효과적이지 않다.'고 판단하고 방법을 바꾸는 행동은 무엇인가?", a: ["인지 전략", "메타인지적 계획", "자기조절학습의 수행, 모니터링", "외적 통제"], c: 2, r: "상태를 모니터링하고 수정하는 자기조절학습의 일부입니다." },
            { cat: 3, q: "다음 중 직업훈련에서 메타인지-자기조절학습이 중요한 이유로 가장 적절한 것은 무엇인가?", a: ["학습 내용이 단순하기 때문에", "교수자의 통제가 항상 가능하기 때문에", "실습 중 오류를 스스로 인식하고 수정해야 하기 때문에", "시험 중심 평가이기 때문에"], c: 2, r: "현장에서 주도적으로 문제를 해결하는 능력이 필요하기 때문입니다." },
            { cat: 3, q: "다음 중 협동학습의 기본 요소에 해당하지 않는 것은 무엇인가?", a: ["긍정적 상호의존", "개인 책무성", "대면적 촉진 상호작용", "교사의 일방적 지식전달"], c: 3, r: "협동학습은 교사 중심이 아닌 상호작용 중심입니다." },
            { cat: 3, q: "다음 중 액션러닝의 핵심요소로 가장 적절한 것은 무엇인가?", a: ["가상의 문제해결", "강의 중심 교수법", "실제 문제를 기반으로 질문과 성찰을 통해 학습하는 방식", "평가만 중시하는 방식"], c: 2, r: "현장의 실제 문제(Action)를 해결하며 배우는 과정입니다." },
            { cat: 3, q: "다음 중 플립러닝의 장점으로 적절하지 않은 것은 무엇인가?", a: ["교사와 학습자 간 개별 피드백 시간 증가", "학습자가 자신의 속도에 맞춰 복습 가능", "교실 활동에서 문제해결 중심 수업 가능", "사전 학습이 필요 없어서 학습 부담 감소"], c: 3, r: "플립러닝은 반드시 사전 학습이 요구됩니다." },
            { cat: 3, q: "통합 프레임워크에서 ADDIE모형의 가장 핵심적인 역할은 무엇인가?", a: ["학습자 간 상호작용 촉진", "문제해결 중심 활동 구성", "전체 수업 설계의 구조적 틀 제공", "사전 학습 자료의 자동 생성"], c: 2, r: "다양한 교수법을 포괄하는 전체 운영체제 역할을 합니다." },
            { cat: 3, q: "플립러닝을 적용한 설계 전략으로 가장 적절한 것은 무엇인가?", a: ["수업시간에 이론 중심 강의를 집중 배치한다.", "사전 학습에서 문제해결 과정을 모두 해결하게 한다.", "사전 학습에서 개념을 제공하고 수업에서는 적용 중심으로 운영한다.", "수업시간에는 평가만 수행한다."], c: 2, r: "이론은 온라인(사전)에서, 실습과 적용은 오프라인(본수업)에서 진행합니다." },
            { cat: 3, q: "메타인지 교수전략이 강조하는 학습자의 행동은 무엇인가?", a: ["개념을 빠르게 암기하는 것", "다른 학습자의 답안을 모방하는 것", "자신의 이해 여부를 점검하고 사고를 조절하는 것", "과제 수행 속도를 높이는 것"], c: 2, r: "본인이 아는 것과 모르는 것을 정확히 구분하고 관리하는 것입니다." },

            // 4과목 (36문제)
            { cat: 4, q: "다음은 행동주의와 구성주의의 학습 원리를 설명한 것이다. 이 중 성격이 다른 것은 무엇인가?", a: ["학습은 연습과 반복 훈련을 통해 변화하는 과정이다.", "교수자는 보다 적극적으로 지식을 전달하는 역할을 수행한다.", "지식은 결코 동일한 형태로 다른 사람에게 전수될 수 없음을 전제한다.", "수업을 계열적으로 조직하고 제시한다."], c: 2, r: "3번은 구성주의의 관점이고 나머지는 행동주의입니다." },
            { cat: 4, q: "다음 중 구성주의가 수업설계에 미친 영향으로 적절한 것은 무엇인가?", a: ["수업 도입 단계에서 명시적인 목표를 제시한다.", "수업을 단계적으로 조직하고 제시한다.", "학습은 자기주도적으로 수행한다.", "교수자는 교수-학습 과정에 적극적으로 개입한다."], c: 2, r: "구성주의는 학습자의 자율성과 자기주도성을 강조합니다." },
            { cat: 4, q: "다음 중 행동주의가 수업설계에 미친 영향으로 적절한 것은 무엇인가?", a: ["수업 도입 단계에서 명시적인 목표를 제시한다.", "지식은 학습자에 의해 구성된다.", "지식은 사회적 협상을 통해 형성된다.", "교수자는 학습은 돕는 조언자이자 동료 학습자이다."], c: 0, r: "구체적이고 관찰 가능한 목표 제시는 행동주의의 특징입니다." },
            { cat: 4, q: "다음 중 단시 수업을 표현한 가장 구체적인 수업목표를 제시하는 단계는 무엇인가?", a: ["단원 단계", "차시 단계", "과정 단계", "교과 단계"], c: 1, r: "1회 분량의 수업 단위를 차시 단계라고 합니다." },
            { cat: 4, q: "다음 중 메이거의 목표 진술 방법으로 개발한 목표로 적절한 것은 무엇인가?", a: ["문예 부흥이 일어나게 된 원인을 최소 3가지 이상 말할 수 있다.", "자장면을 30분 내에 조리할 수 있다.", "50m의 레인에서 200m를 수영할 수 있다.", "포토샵5.0이 장착된 컴퓨터에서 사진 속 인물의 얼굴 모양을 20분 이내에 수정할 수 있다."], c: 3, r: "상황(조건), 도달기준, 도착점 행동이 모두 포함되어야 합니다." },
            { cat: 4, q: "다음 중 목표를 진술할 때 사용할 수 없는 동사는 무엇인가?", a: ["확인한다.", "설명한다.", "이해한다.", "조절한다."], c: 2, r: "이해한다는 겉으로 드러나지 않는 내현적 동사로 측정하기 어렵습니다." },
            { cat: 4, q: "다음은 수업목표의 예시이다. 이 중 학습성과 영역이 다른 목표의 진술은 무엇인가?", a: ["색깔에 따라 커피의 볶음 정도를 구분할 수 있다.", "면 종류에 따라 어울리는 고명을 만들 수 있다.", "기름과 물을 이용하여 손질한 재료를 익힐 수 있다.", "전분을 이용하여 조림요리의 농도를 조절할 수 있다."], c: 0, r: "1번은 선택/판단에 해당하는 지적 기능, 나머지는 운동 기능입니다." },
            { cat: 4, q: "다음 중 지적 기능을 가장 적절하게 설명한 것은 무엇인가?", a: ["구체적인 정보를 재생하고 기억하는 훈련생의 능력", "신체의 움직임을 요구하는 육체적 활동과 관련된 학습", "특정한 방식으로 행동하는 개인의 감정 및 신념", "정보의 단순 암기를 초월하여 훈련생이 정보를 실제로 활용하는 능력"], c: 3, r: "원리나 법칙을 새로운 상황에 적용하는 능력이 지적 기능입니다." },
            { cat: 4, q: "다음 중 운동 기능과 관련된 목표에서 사용할 수 없는 동사는 무엇인가?", a: ["진술한다.", "조리한다.", "수영한다.", "조립한다."], c: 0, r: "진술한다는 입으로 말하는 지식(언어 정보)의 평가 동사입니다." },
            { cat: 4, q: "다음 중 평가에서 대상의 특성을 수량화하거나, 가치 중립적인 개념을 지향하는 개념은 무엇인가?", a: ["평가(Evaluation)", "측정(Measurement)", "사정 (Assessment)", "수행(Performance)"], c: 1, r: "숫자를 부여하는 행위 그 자체가 측정이므로 가치 중립적입니다." },
            { cat: 4, q: "절대평가(준거지향평가)에서 평가의 기준이 되는 것은 무엇인가?", a: ["학습자의 요구", "순위 혹은 성적", "도달 목표", "검사 평균"], c: 2, r: "사전에 설정된 목표 도달 여부가 평가의 유일한 기준입니다." },
            { cat: 4, q: "다음 중 개념과 설명의 관계를 잘못 연결한 것은 무엇인가?", a: ["총괄평가 - 목표의 달성도를 알아보기 위해 시행되는 평가", "형성평가 - 수업과정에서 정상적인 진도를 수행하는지를 점검하는 평가", "상대평가 - 집단 내에서의 상대적 위치를 알려주는 평가", "진단평가 - 학습자의 성적을 최종적으로 확인하는 평가"], c: 3, r: "성적을 최종 확인하는 것은 진단평가가 아니라 총괄평가입니다." },
            { cat: 4, q: "다음 중 수행평가를 설명한 것과 관계가 먼 것은 무엇인가?", a: ["수행평가는 과정으로의 지식과 결과로서의 지식을 강조한다.", "수행평가는 암기하고 있는 지식의 양을 평가한다.", "수행평가는 실제 상황이나 유사 모의 상황에서 수행된다.", "수행평가는 관찰 및 인터뷰 등의 직접적으로 수행된다."], c: 1, r: "지식의 암기량을 묻는 것은 전통적인 지필 평가 방식입니다." },
            { cat: 4, q: "다음 중 루브릭의 역할을 바르게 설명한 것은 무엇인가?", a: ["지적인 특성 즉 지식과 정보를 평가한다.", "선택형 시험 즉 사지선다형 시험에서 사용한다.", "학습자의 암기 능력을 확인하는 시험에서 주로 사용한다.", "평가자의 주관적 판단이 강조되는 평가에서 주로 사용한다."], c: 3, r: "주관이 개입될 수 있는 서술형/실기 평가에서 객관성을 확보하는 도구입니다." },
            { cat: 4, q: "다음 중 객관도의 관점에서 평가 결과에 대한 평가자의 주관이 들어갈 수 없는 것은 무엇인가?", a: ["선택형 시험으로 평가받는 것", "기술적 능력을 평가하기 위한 것", "자신의 성과를 발표하는 능력을 평가하는 것", "자신의 성과를 포트폴리오로 평가받는 것"], c: 0, r: "객관식(선택형) 시험은 채점자의 주관이 개입할 여지가 없습니다." },
            { cat: 4, q: "가네의 수업사태 모형에서 이전 정보와 새로운 정보를 통합하고 그 결과를 장기기억에 저장하는 교수자의 활동으로 적절한 것은 무엇인가?", a: ["학습 안내 제공", "학습내용 제시", "파지와 전이의 촉진", "주의포착"], c: 0, r: "제공된 정보의 의미적 부호화를 돕는 학습 안내 제공 단계입니다." },
            { cat: 4, q: "도입부 단계에서 발생하는 활동이 아닌 것은 무엇인가?", a: ["파지와 전이 촉진", "주의포착", "목표 제시", "선수학습 회상"], c: 0, r: "파지와 전이 촉진은 수업의 정리부에 해당합니다." },
            { cat: 4, q: "수업사태이론에서 수업의 전개부와 관련이 먼 것은 무엇인가?", a: ["학습 안내", "수행 도출", "파지와 전이 촉진", "자극자료 제시"], c: 2, r: "파지와 전이 촉진은 평가 및 학습의 마무리(정리부) 단계입니다." },
            { cat: 4, q: "다음 중 켈러의 동기이론에서 학습자의 호기심과 관심을 유발하여 주의를 끌거나 학습이 일어나기를 만드는 전략은 무엇인가?", a: ["만족감 전략", "자신감 전략", "주의집중 전략", "관련성 전략"], c: 2, r: "ARCS 중 Attention(주의집중)에 해당합니다." },
            { cat: 4, q: "다음 중 만족감 전략을 설명한 것과 관계가 먼 것은 무엇인가?", a: ["실기 작품에 대한 평가기준를 제시하기", "쉬운 것에서 어려운 것으로 과제를 제시하기", "목표에 기술되어 있는 시험의 조건을 학인하기", "친밀한 인물 혹은 사건을 활용하기"], c: 3, r: "친밀한 인물/사건 활용은 주의집중(A) 또는 관련성(R) 전략입니다." },
            { cat: 4, q: "다음 중 자신감 전략을 설명한 것과 관계가 먼 것은 무엇인가?", a: ["학습의 필요조건 제시 전략", "성공의 기회 제시 전략", "개인적 통제 전략", "외재적 강화 전략"], c: 3, r: "외재적 강화(보상)는 결과에 대한 만족감(S) 전략입니다." },
            { cat: 4, q: "교수매체를 선정하는 기준과 관계가 먼 것은 무엇인가?", a: ["학습자 특성", "수업활동", "수업목표와 내용", "교수자 선호도"], c: 3, r: "교수자의 개인적 취향보다 학습자와 목표 달성이 매체 선정의 기준이 되어야 합니다." },
            { cat: 4, q: "사용자를 현실과 완전히 분리된 컴퓨터 생성 가상 환경으로 안내하여 몰입하는 매체는 무엇인가?", a: ["증강현실(AR)", "혼합현실(MR)", "확장현실(XR)", "가상현실(VR)"], c: 3, r: "외부 현실과 완전히 차단되는 환경은 VR입니다." },
            { cat: 4, q: "다음 중 매체 활용의 필요성과 관계가 먼 것은 무엇인가?", a: ["수업시간을 보다 효율적으로 관리할 수 있다.", "수업의 효율성을 높일 수 있다.", "학습자의 학업성취를 높일 수 있다.", "다양한 교수-학습 환경을 실현할 수 있다."], c: 0, r: "(원문 마킹 기준) 학습자의 성취를 돕는 것이 본질적 목적입니다." },

            { cat: 4, q: "학습자의 능력, 흥미, 요구, 학습속도 등에 따라 학습을 하는 교수방법은 무엇인가?", a: ["대집단 수업", "개별화 수업", "소집단 수업", "질의응답 수업"], c: 1, r: "학습자 개개인의 특성에 맞추는 개별화 수업입니다." },

            { cat: 4, q: "문제 기반 학습(PBL)의 특징을 설명한 것과 거리가 먼 것은 무엇인가?", a: ["교육의 중심에 학습자를 우선한다.", "실제 생활과 유사한 문제가 주어진다.", "대부분의 교육은 개별화 수업으로 진행된다.", "평가는 과정과 결과를 모두 중시한다."], c: 2, r: "PBL은 일반적으로 소집단(팀) 기반으로 운영됩니다." },

            { cat: 4, q: "도입부의 주요 활동으로 옳은 것은 무엇인가?", a: ["총괄평가 실시", "형성평가 실시", "학습결과 정리", "주의집중 및 학습동기 유발"], c: 3, r: "학습의 이유를 제시하고 흥미를 끄는 단계입니다." },
            { cat: 4, q: "수행절차 체크리스트에 대한 설명으로 가장 적절한 것은 무엇인가?", a: ["학습자의 태도를 평가하기 위한 도구이다.", "작업이나 절차를 확인하기 위해 미리 목록화 한 점검 도구이다.", "학습 결과만을 기록하는 평가 문서이다.", "교수자의 강의 내용을 요약한 자료이다."], c: 1, r: "실습 중 반드시 거쳐야 할 과정과 동작을 빠짐없이 점검하는 도구입니다." },
            { cat: 4, q: "수행절차 체크리스트 활용 시 교수자와 학습자의 역할로 옳은 것은 무엇인가?", a: ["교수자는 평가만을 하고 학습자는 관찰만 한다.", "교수자는 시범을 보이고 학습자는 연습을 한다.", "교수자는 설명만 하고 학습자는 자율 학습을 한다.", "교수자와 학습자는 서로 다른 체크리스트를 사용한다."], c: 1, r: "교수자는 정확한 절차를 시연하고 학습자는 그것을 따라 연습합니다." },
            { cat: 4, q: "학습자의 수행 적합성을 판단하는 외현적 동사로 가장 적절한 것은 무엇인가?", a: ["안다.", "이해한다.", "인지한다.", "조립한다."], c: 3, r: "눈으로 관찰하고 채점할 수 있는 구체적인 행동 동사입니다." },

            // 5과목 (18문제)
            { cat: 5, q: "다음 중 직업훈련교사의 역할에 대한 설명으로 가장 거리가 먼 것은 무엇인가?", a: ["직업훈련교사는 단순히 강의를 전달하는 역할에 머무르는 사람이다.", "교육 설계자이자 운영자, 행정 실무자, 훈련생 촉진자로서 복합적 역할을 수행한다.", "교육 현장을 중심으로 다양한 전문성을 발휘하는 통합적 직업교육 전문가 이다.", "훈련생의 성취감과 변화를 촉진하며 교육의 의미를 되새기는 존재이다."], c: 0, r: "단순한 지식 전달자가 아닌 복합적인 교육 매니저입니다." },
            { cat: 5, q: "다음 중 '직업정체성이 분명한 직업훈련교사'에 관한 설명으로 거리가 먼 것은 무엇인가?", a: ["자신의 일을 '사람의 성장을 돕는 의미 있는 일'로 인식한다.", "훈련생을 단순한 수강생으로 보고 감정보다는 성과 중심으로 평가한다.", "교육의 변화에 맞춰 수업을 지속적으로 개선하려는 노력을 기울인다.", "스스로를 '학습하는 전문가'로 인식하며 자기 개발을 지속한다."], c: 1, r: "기계적 성과 측정이 아니라 훈련생의 전인적 성장을 돕습니다." },
            { cat: 5, q: "다음 중 직업훈련교사의 직업정체성 강화를 위한 실천전략으로 보기 어려운 것은 무엇인가?", a: ["자기성찰을 습관화하여 자신의 수업과 경험을 돌아본다.", "자신의 일과 역할에 담긴 가치와 의미를 명료하게 한다.", "교육 현장의 변화를 무시하고 기존 방식을 그대로 유지한다.", "지속적인 전문성 개발을 통해 직업적 성장을 도모한다."], c: 2, r: "변화하는 산업과 교육 환경에 맞춰 스스로를 혁신해야 합니다." },
            { cat: 5, q: "다음 중 '커리어 역량(Career Competency)'의 개념으로 가장 알맞은 것은 무엇인가?", a: ["특정 직업에 필요한 기술적 능력", "직무 수행시 필요한 도구 활용 능력", "자신의 일과 삶의 방향을 탐색하고 변화에 적응하며 성장하는 능력", "조직의 목표 달성을 위한 팀워크 능력"], c: 2, r: "전 생애에 걸쳐 경력을 설계하고 발전시키는 종합적 능력입니다." },
            { cat: 5, q: "다음 중 '직업 흥미'의 정의로 가장 적절한 것은 무엇인가?", a: ["직무 수행을 위한 기술 숙련 정도", "내가 어떤 일이나 활동에 즐거움과 몰입을 느끼는 심리적 에너지 원천", "개인의 가치관과 신념의 표현", "직업적 성취를 측정하는 평가 지표"], c: 1, r: "흥미는 특정 활동을 하고 싶게 만드는 내적 동력입니다." },
            { cat: 5, q: "다음 중 직업가치관에 대한 설명으로 거리가 먼 것은 무엇인가?", a: ["일을 통해 얻고자 하는 목표, 신념, 의미에 대한 내적 기준이다.", "개인이 중요하게 여기는 가치에 따라 일의 만족과 방향이 달라질 수 있다.", "직업가치관은 단기적인 감정 상태에 따라 쉽게 변하는 특성이다.", "직업가치관은 진로 선택과 직무 만족에 영향을 미친다."], c: 2, r: "가치관은 비교적 장기적이고 확고하게 자리 잡은 내적 기준입니다." },
            { cat: 5, q: "생애설계에 대한 설명으로 가장 적절한 것은 무엇인가?", a: ["진로나 은퇴를 위한 단기 계획이다.", "정부가 정한 기준에 맞추는 경력 관리 과정이다.", "자신의 전 생애를 통합적으로 이해하고 주체적으로 설계해 나가는 과정이다.", "재무적 안정만을 추구하는 재산 설계 과정 이다."], c: 2, r: "일, 가정, 여가 등 생애 전반을 아우르는 라이프 플래닝입니다." },
            { cat: 5, q: "생애설계의 중요성에 대한 설명으로 옳은 것은 무엇인가?", a: ["환경 변화에 수동적으로 적응하는 태도를 기를 수 있다.", "삶의 균형을 잃지 않고 주도적으로 살아갈 수 있는 힘을 기를 수 있다.", "재무적 목표에만 집중할 수 있다.", "경력 경쟁력을 높이기 위해 타인을 모방할 수 있다."], c: 1, r: "어떤 변화 속에서도 내 삶의 주도권을 쥐기 위해 필요합니다." },
            { cat: 5, q: "다음 중 생애설계의 핵심 영역에 대한 설명으로 옳은 것은 무엇인가?", a: ["일 영역은 생계 유지보다 재산증식만을 목적으로 한다.", "관계 영역은 직업적 성과와는 관련이 없다.", "건강 영역은 모든 생애 영역의 기반이 되는 요소이다.", "재무 영역은 여가활동과는 전혀 관계가 없다."], c: 2, r: "신체와 정신의 건강이 무너지면 다른 모든 영역도 유지할 수 없습니다." },
            { cat: 5, q: "다음 중 생애 주기 발달과업에 대한 설명으로 거리가 먼 것은 무엇인가?", a: ["한 시기마다 개인이 달성해야 할 삶의 목표와 역할을 의미한다.", "다양한 생애 영역에서 나타난다.", "현재 나의 상태를 점검하고 다음 단계의 방향을 설정하는데 활용된다.", "생애 주기 발달과업은 모든 사람이 동일한 시기에 동일한 과업을 달성해야 한다."], c: 3, r: "개인의 환경과 선택에 따라 시기와 속도는 다를 수 있습니다." },
            { cat: 5, q: "다음 중 건강 영역의 상태를 진단하기 위한 지표로 틀린 것은 무엇인가?", a: ["스트레스 수준", "규칙적인 식습관 및 운동", "자산 관리 및 지출 구조", "수면 및 휴식의 질"], c: 2, r: "자산 관리는 재무 영역의 지표입니다." },
            { cat: 5, q: "'자아 탐색과 성장 기반 형성', '삶의 균형 유지와 자기역량 강화', '인생의 통합과 자아 완성'등의 내용이 포함된 생애 영역은 무엇인가?", a: ["자기 성장 및 여가 영역", "일(직업/경력) 영역", "경제(재무, 노후준비) 영역", "관계(가족, 사회적관계) 영역"], c: 0, r: "개인적인 내적 성숙과 취미 활동을 아우르는 영역입니다." },
            { cat: 5, q: "다음 중 생애 비전에 대한 설명으로 거리가 먼 것은 무엇인가?", a: ["생애 비전은 삶의 가치, 흥미, 강점, 기여가 통합된 방향이다.", "생애 비전은 일 영역만이 아니라 관계, 건강 등 전 영역을 포함한다.", "생애 비전은 단기적 목표를 중심으로 구성된다.", "생애 비전은 개인의 삶의 방향을 제시하는 나침반이다."], c: 2, r: "단기적인 것이 아니라 장기적이고 궁극적인 지향점입니다." },
            { cat: 5, q: "생애설계 계획서의 작성 방법으로 가장 적절하지 않은 것은 무엇인가?", a: ["각 생애 영역별로 현재 상태와 목표를 점검한다.", "SMART 원칙에 따라 구체적이고 실행 가능한 목표를 설정한다.", "실행 계획에는 구체적인 시간, 자원, 점검 방법을 포함한다.", "장기 목표만 설정하고 단기 목표는 생략한다."], c: 3, r: "장기 목표를 달성하기 위한 구체적인 단기 목표가 반드시 필요합니다." },
            { cat: 5, q: "다음 중 생애설계 계획서의 실행 전략 수립 방법으로 틀린 것은 무엇인가?", a: ["목표를 실행 가능한 수준으로 세분화하고 행동계획을 작성한다.", "무엇을, 언제, 어떻게, 누구와의 관점에서 실천 내용을 구체화한다.", "실행계획은 월간, 분기별 단위로 관리할 수 있다.", "실행계획에는 점검방법을 포함하지 않아도 된다."], c: 3, r: "제대로 실천하고 있는지 확인할 피드백(점검) 수단이 필수적입니다." },
            { cat: 5, q: "자기돌봄에 대한 설명으로 거리가 먼 것은 무엇인가?", a: ["신체적, 정서적 건강을 유지하기 위한 의도적 활동이다.", "스트레스 상황에서 즉흥적으로 감정을 해소하는 행위이다.", "예방적이고 지속적인 자기 관리 활동이다.", "심리적 안녕과 회복을 돕는 다차원적 과정이다."], c: 1, r: "순간적 해소가 아니라 의식적이고 계획적인 재충전 과정입니다." },
            { cat: 5, q: "자기돌봄 전략으로 가장 부적절한 것은 무엇인가?", a: ["하루 10~20분 자신만의 회복 시간 갖기", "감정을 되도록 느끼지 않으려고 노력하기", "주말엔 일 이야기 금지 구역 설정", "동료와의 감정 나눔 및 상담 활동"], c: 1, r: "감정을 억압하는 것은 장기적으로 번아웃을 초래합니다." },
            { cat: 5, q: "직업훈련교사의 자기돌봄에 대한 설명으로 거리가 먼 것은 무엇인가?", a: ["자기돌봄은 일과 삶의 균형을 돕는다.", "자기돌봄은 훈련생의 성장을 지원하는 기반이 된다.", "자기돌봄은 외적 평가보다 내적 안정에 초점을 둔다.", "자기돌봄은 위기 상황이 발생한 후에만 필요하다."], c: 3, r: "위기가 발생하기 전 일상에서 예방적으로 수행해야 합니다." },

            // 6과목 (18문제)
            { cat: 6, q: "다음 중 상담의 정의에 대한 내용으로 바람직하지 않은 것은 무엇인가요?", a: ["내담자가 상담자와의 대면 관계에서 인간적 성장을 위해 노력하는 학습 과정", "상담자가 촉진적 의사소통을 통하여 내담자가 자기 이해를 터득하도록 도와주는 과정", "내담자가 호소하는 다양한 문제들을 분석하여 상담자가 해결해주는 과정", "내담자가 긍정적인 변화를 만들 수 있도록 도움을 주는 과정"], c: 2, r: "상담은 상담자가 정답을 주고 대신 해결해주는 것이 아닙니다." },
            { cat: 6, q: "상담의 유형 중, 상담 진행방식에 따른 분류는 무엇인가?", a: ["대면상담", "심리상담", "학습상담", "진로 및 직업상담"], c: 0, r: "대면, 전화, 사이버 등 어떻게 만날 것인가에 대한 분류입니다." },
            { cat: 6, q: "훈련생 상담의 특징으로 바람직하지 않은 것은 무엇인가?", a: ["다양한 연령대의 내담자를 대상으로 한다.", "모든 훈련기관에 전담인력이 있어 훈련교사의 역할이 중요하지 않다.", "훈련 직종에 대한 전문적인 지식과 경험이 필요하다.", "레포(Rapport)형성이 쉽다."], c: 1, r: "현장에서는 매일 얼굴을 보는 훈련교사의 초기 상담자 역할이 매우 중요합니다." },
            { cat: 6, q: "다음 중 청년층 훈련생의 특성으로 적합하지 않은 것은 무엇인가?", a: ["자기 이해 부족함", "조직문화에 익숙함", "학습이나 진로결정에 있어 타인에게 의존하려는 경향이 있음", "대인관계에 어려움을 느낌"], c: 1, r: "사회 초년생은 조직 문화와 규범에 아직 익숙하지 않은 경우가 많습니다." },
            { cat: 6, q: "다음 중 경력단절여성 훈련생 상담전략으로 적합하지 않은 것은 무엇인가?", a: ["자신감 및 확신이 부족한 상황을 공감적으로 이해", "생애 역할 중 직업인의 역할이 제일 중요함을 강조", "배우자 및 주변인들과의 갈등상황 탐색, 훈련교사의 지지 필요", "훈련 성공사례 제시"], c: 1, r: "가정 등 다양한 생애 역할을 존중하되 균형을 찾도록 도와야 합니다." },
            { cat: 6, q: "다음 중 중장년층 훈련생의 특성으로 적합하지 않은 것은 무엇인가?", a: ["개인주의에 익숙하지 않음", "자신의 경력에 대한 자부심이 높음", "익숙한 방식을 선호함", "재취업에 대한 자신감이 높음"], c: 3, r: "새로운 기술 학습과 재취업에 대한 두려움과 불안감이 클 수 있습니다." },
            { cat: 6, q: "심리학적 상담 이론의 주요 세력 중, 정신역동적 접근에 해당하는 이론이 아닌 것은 무엇인가?", a: ["정신분석 상담 이론", "게슈탈트 상담 이론", "개인 심리학적 상담 이론", "분석 심리학적 상담 이론"], c: 1, r: "게슈탈트는 인본주의-실존주의적 접근에 해당합니다." },
            { cat: 6, q: "인간의 지각 수준 중 하나로, 인식 영역 밖에 있는 세계, 보이지 않지만 인간의 행동을 결정하는 것은?", a: ["의식", "전의식", "무의식", "죄의식"], c: 2, r: "프로이트가 강조한 억압된 욕망과 기억의 저장고인 무의식입니다." },
            { cat: 6, q: "사회적으로 그럴듯한 이유를 붙여 자기 행동 정당화시키는 방어기제로, '여우의 신포도' 이야기가 이에 해당하는 것은?", a: ["합리화", "투사", "퇴행", "억압"], c: 0, r: "자신의 실패나 실수를 변명하여 자아를 보호하려는 합리화입니다." },
            { cat: 6, q: "인지정서행동 상담 이론에서 비합리적인 신념을 이루는 당위적 사고가 아닌 것은 무엇인가?", a: ["자신에 대한 당위", "타인에 대한 당위", "세상에 대한 당위", "학습에 대한 당위"], c: 3, r: "자신, 타인, 환경(세상)에 대한 '반드시 ~해야만 한다'는 강박적 사고입니다." },
            { cat: 6, q: "다음 중 ABCDE 모형에 대한 설명으로 적절하지 않은 것은 무엇인가?", a: ["A: 선행사건(Activating Event)", "B: 행동(Behavior)", "C: 결과(Consequences)", "D: 논박(Dispute)"], c: 1, r: "B는 행동이 아니라 내담자가 사건을 바라보는 신념(Belief) 체계입니다." },
            { cat: 6, q: "인지정서행동 상담 이론의 상담 방법이 아닌 것은 무엇인가?", a: ["비합리적 신념 논박하기", "인지적 과제 주기", "자유연상하기", "대처 진술 숙달시키기"], c: 2, r: "자유연상과 꿈의 해석 등은 정신분석 상담의 주요 기법입니다." },
            { cat: 6, q: "진로 및 직업상담의 목표로 적절하지 않은 것은 무엇인가?", a: ["자신에 관한 보다 정확한 이해 증진", "직업 세계에 대한 이해 증진", "소득이 많은 직업 권장", "정보 탐색 및 활용 능력의 함양"], c: 2, r: "단순히 돈을 많이 버는 직업을 권하는 것은 올바른 직업상담이 아닙니다." },
            { cat: 6, q: "한국표준직업분류에서 직업의 성립 요건이 아닌 것은 무엇인가?", a: ["계속성", "경제성", "윤리성", "개방성"], c: 3, r: "직업 성립 요건은 계속성, 경제성, 윤리성, 사회성, 자율성입니다." },
            { cat: 6, q: "특성-요인 상담이론의 변별 진단 범주가 아닌 것은 무엇인가?", a: ["불확실한 선택", "정보의 부족", "흥미와 적성의 모순", "현명하지 않은 선택"], c: 1, r: "진로 무선택, 불확실한 선택, 흥미와 적성의 모순, 현명하지 않은 선택 4가지입니다." },
            { cat: 6, q: "타인의 문제를 듣고, 이해하고, 봉사하는 활동에 흥미가 있으며, 성격이 참을성 있고 동정심이 많은 직업성격 유형은?", a: ["현실형(R)", "탐구형(I)", "예술형(A)", "사회형(S)"], c: 3, r: "타인을 가르치고 돕는 사회복지사, 교사 등이 속하는 S(Social) 유형입니다." },
            { cat: 6, q: "직업성격 이론에서 검사 해석의 진단적 척도 중 사람이나 환경이 얼마나 잘 구별되는지를 의미하는 것은 무엇인가?", a: ["일관성", "변별성", "정체성", "일치성"], c: 1, r: "어느 한 유형의 점수가 뚜렷하게 높게 나타나는지 보는 변별성 척도입니다." },
            { cat: 6, q: "다음 중 직업성격 이론에 대한 설명으로 적합하지 않은 것은 무엇인가?", a: ["RIASEC 이론 혹은 Holland 이론이라고도 부름", "개인의 직업 성격 유형을 R,I,A,S,E,C로 분류", "개인의 성격과 잘 맞는 환경을 알면 직업전환, 성취 등 예측 가능", "일치성, 일관성 등의 진단적 척도를 오늘날 상담 현장에서 전적으로 활용할 수 있음"], c: 3, r: "참고 도구일 뿐 전적으로 맹신하여 기계적으로 활용해서는 안 됩니다." }
        ];

        let currentQuiz = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswerChecked = []; // 각 문항별 정답 확인 여부 추적 배열
        let isMock = false;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startCategoryQuiz(catId) {
            const catQuestions = questionData.filter(q => q.cat === catId);
            currentQuiz = shuffle([...catQuestions]).slice(0, 5);
            isMock = false;
            initQuiz(`제${catId}과목 집중 학습`);
        }

        function startMockExam() {
            currentQuiz = shuffle([...questionData]).slice(0, 40);
            isMock = true;
            initQuiz("전체 종합 모의고사");
        }

        function initQuiz(title) {
            currentIndex = 0;
            userAnswers = new Array(currentQuiz.length).fill(null);
            isAnswerChecked = new Array(currentQuiz.length).fill(false); // 초기화
            
            document.getElementById('quiz-title').innerText = title;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('flex');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuiz[currentIndex];
            document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${currentQuiz.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / currentQuiz.length) * 100}%`;
            document.getElementById('question-text').innerText = `${currentIndex + 1}. ${q.q}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            // 보기 렌더링
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                let baseClass = `option-card w-full p-5 text-left border-2 rounded-xl transition-all duration-200 text-lg `;
                
                // [집중학습 모드]에서 이미 "정답 확인"을 누른 경우의 스타일링
                if (!isMock && isAnswerChecked[currentIndex]) {
                    if (idx === q.c) {
                        // 정답 항목은 연두색 강조
                        baseClass += 'bg-[#dcfce7] border-[#22c55e] text-green-900 font-bold'; 
                    } else if (userAnswers[currentIndex] === idx) {
                        // 내가 틀리게 선택한 항목은 빨간색 강조
                        baseClass += 'bg-red-50 border-red-300 text-red-900 line-through';
                    } else {
                        // 선택 안 한 오답
                        baseClass += 'border-gray-100 bg-gray-50 opacity-50';
                    }
                    btn.disabled = true; // 선택 변경 불가
                    btn.className = baseClass;
                } else {
                    // 평상시 / 모의고사 시 스타일링
                    baseClass += userAnswers[currentIndex] === idx ? 'option-selected' : 'border-gray-200 bg-white hover:bg-gray-50';
                    btn.className = baseClass;
                    btn.onclick = () => selectOption(idx);
                }
                
                btn.innerHTML = `<span class="font-bold mr-3 ${(!isMock && isAnswerChecked[currentIndex] && idx === q.c) ? 'text-green-700' : 'text-blue-500'}">${idx + 1}</span> ${opt}`;
                container.appendChild(btn);
            });

            // UI 요소 (이전, 다음 버튼 등) 업데이트
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerText = currentIndex === currentQuiz.length - 1 ? '답안 제출하기' : '다음 문제';
            document.getElementById('next-btn').className = currentIndex === currentQuiz.length - 1 
                ? "px-8 py-3 bg-gray-800 text-white font-bold rounded-xl hover:bg-black shadow-md transition-colors"
                : "px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md transition-colors";

            // 정답 확인 버튼 및 해설창 제어
            const checkAnsBtn = document.getElementById('check-ans-btn');
            const expArea = document.getElementById('explanation-area');
            const expText = document.getElementById('explanation-text');

            if (!isMock) { // 집중학습 모드
                if (isAnswerChecked[currentIndex]) {
                    // 이미 정답을 확인한 상태
                    checkAnsBtn.classList.add('hidden');
                    expArea.classList.remove('hidden');
                    expText.innerText = q.r;
                } else {
                    // 아직 정답을 확인하지 않은 상태
                    expArea.classList.add('hidden');
                    checkAnsBtn.classList.remove('hidden');
                    
                    // 답을 선택해야만 정답확인 버튼 활성화 (회색 -> 초록색)
                    if (userAnswers[currentIndex] === null) {
                        checkAnsBtn.className = "hidden px-6 py-3 bg-gray-300 text-white font-bold rounded-xl cursor-not-allowed transition-colors";
                    } else {
                        checkAnsBtn.className = "hidden px-6 py-3 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-colors";
                    }
                    checkAnsBtn.classList.remove('hidden');
                }
            } else { // 모의고사 모드
                checkAnsBtn.classList.add('hidden');
                expArea.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIndex] = idx;
            showQuestion(); // 재렌더링하여 선택 표시 (및 정답확인 버튼 활성화)
        }

        function checkAnswer() {
            if (userAnswers[currentIndex] === null) {
                alert("답안을 먼저 선택해주세요.");
                return;
            }
            isAnswerChecked[currentIndex] = true;
            showQuestion(); // 정답 하이라이트 및 해설창 표시를 위한 재렌더링
        }

        function nextQuestion() {
            if (currentIndex < currentQuiz.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                const unanswered = userAnswers.filter(a => a === null).length;
                if (unanswered > 0) {
                    if (!confirm(`아직 풀지 않은 문제가 ${unanswered}개 있습니다. 정말 제출하시겠습니까?`)) {
                        return;
                    }
                }
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        function finishQuiz() {
            let correctCount = 0;
            currentQuiz.forEach((q, idx) => {
                if (userAnswers[idx] === q.c) correctCount++;
            });

            const score = Math.round((correctCount / currentQuiz.length) * 100);
            const passed = isMock ? score >= 60 : true;

            document.getElementById('quiz-screen').classList.remove('flex');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const badge = document.getElementById('result-badge');
            const status = document.getElementById('result-status');
            
            if (isMock) {
                if (passed) {
                    badge.innerHTML = '🎉';
                    badge.className = "w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-6xl shadow-inner bg-blue-100";
                    status.innerText = "합격을 축하합니다!";
                    status.className = "text-4xl font-bold mb-2 text-blue-700";
                } else {
                    badge.innerHTML = '😥';
                    badge.className = "w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-6xl shadow-inner bg-red-50";
                    status.innerText = "불합격입니다.";
                    status.className = "text-4xl font-bold mb-2 text-red-600";
                }
            } else {
                badge.innerHTML = '📚';
                badge.className = "w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-6xl shadow-inner bg-green-100";
                status.innerText = "집중 학습 완료!";
                status.className = "text-4xl font-bold mb-2 text-green-700";
            }

            document.getElementById('result-score').innerText = `${score}점`;
            
            let detailText = `${currentQuiz.length}문제 중 ${correctCount}문제를 맞히셨습니다.`;
            if(isMock) detailText += " (기준: 60점 이상 합격)";
            document.getElementById('result-detail').innerText = detailText;

            // 전체 문항 해설 리뷰
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            currentQuiz.forEach((q, idx) => {
                const isCorrect = userAnswers[idx] === q.c;
                const userAnswerText = userAnswers[idx] !== null ? q.a[userAnswers[idx]] : '선택 안함';
                
                const div = document.createElement('div');
                div.className = `p-5 rounded-xl border ${isCorrect ? 'bg-white border-blue-200' : 'bg-red-50 border-red-200'}`;
                
                div.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="text-2xl mt-1">${isCorrect ? '🔵' : '❌'}</div>
                        <div class="flex-1">
                            <p class="font-bold text-lg mb-3 text-gray-800">[${idx + 1}번] ${q.q}</p>
                            <div class="space-y-1 mb-4">
                                <p class="text-sm text-gray-600">내 선택 : <span class="${isCorrect ? 'font-bold text-blue-600' : 'font-bold text-red-600 line-through'}">${userAnswerText}</span></p>
                                <p class="text-sm text-blue-800 font-bold">정답 : ${q.a[q.c]}</p>
                            </div>
                            <div class="bg-gray-100 p-3 rounded-lg border border-gray-200 text-sm text-gray-700 leading-relaxed">
                                💡 <span class="font-semibold">해설:</span> ${q.r}
                            </div>
                        </div>
                    </div>
                `;
                reviewList.appendChild(div);
            });
        }

        function toggleReview() {
            const area = document.getElementById('review-area');
            area.classList.toggle('hidden');
            if(!area.classList.contains('hidden')) {
                area.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
