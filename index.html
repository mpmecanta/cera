<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직업훈련교사 자격교육 종합 CBT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .option-card:hover:not(:disabled) { background-color: #ebf5ff; border-color: #3b82f6; }
        .option-selected { background-color: #3b82f6 !important; color: white; border-color: #2563eb; }
        #review-area { scroll-margin-top: 2rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px] flex flex-col">
        <div id="home-screen" class="p-8 flex-1">
            <h1 class="text-3xl font-bold text-center text-blue-700 mb-2">직업훈련교사 CBT 종합 평가</h1>
            <p class="text-center text-gray-500 mb-8">온라인 1~7과목 전체 136문제 완벽 수록</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <button onclick="startMockExam()" class="flex flex-col items-center justify-center p-8 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-all shadow-lg transform hover:-translate-y-1 h-full">
                    <div class="text-4xl mb-4">🏆</div>
                    <div class="text-2xl font-bold mb-2">종합 모의고사 시작</div>
                    <div class="text-sm opacity-90 text-center">전체 136문제 중 랜덤 40문제 출제<br>60점 (24문제) 이상 합격<br><span class="text-xs text-blue-200 mt-1 inline-block">(※ 모의고사는 마지막에 일괄 채점됩니다)</span></div>
                </button>
                <div class="space-y-3 bg-gray-50 p-6 rounded-2xl border border-gray-100 h-96 overflow-y-auto">
                    <p class="text-lg font-bold text-gray-700 mb-2 border-b pb-2 sticky top-0 bg-gray-50 z-10">과목별 집중 학습 (5문제 랜덤)</p>
                    <p class="text-xs text-green-600 font-bold mb-4">✔ 문제마다 즉시 정답과 해설 확인 가능</p>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="startCategoryQuiz(1)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">1과목. 학습자 이해와 능력개발</button>
                        <button onclick="startCategoryQuiz(2)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">2과목. 직업훈련교사의 책무와 역량</button>
                        <button onclick="startCategoryQuiz(3)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">3과목. 수업 설계 전략 입문</button>
                        <button onclick="startCategoryQuiz(4)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">4과목. 수업설계의 이해</button>
                        <button onclick="startCategoryQuiz(5)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">5과목. 직훈교사로서의 생애설계</button>
                        <button onclick="startCategoryQuiz(6)" class="p-3 bg-white border border-gray-200 rounded-lg text-left hover:bg-blue-50 hover:border-blue-300 transition-colors">6과목. 훈련생 이해 및 상담 이론</button>
                        <button onclick="startCategoryQuiz(7)" class="p-3 bg-blue-50 border border-blue-200 rounded-lg text-left font-bold text-blue-800 hover:bg-blue-100 hover:border-blue-400 transition-colors">7과목. 직업능력개발훈련개관 (NEW)</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="hidden flex-1 flex flex-col">
            <div class="bg-gray-100 p-4 flex justify-between items-center border-b">
                <span id="quiz-title" class="font-bold text-blue-800">시험 중</span>
                <span id="quiz-progress" class="text-sm font-bold bg-white px-3 py-1 rounded-full shadow-sm text-blue-600">1 / 40</span>
            </div>
            <div class="w-full bg-gray-200 h-2">
                <div id="progress-bar" class="bg-blue-500 h-2 transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="p-8 flex-1 flex flex-col">
                <div id="question-text" class="text-xl md:text-2xl font-bold mb-8 text-gray-800 min-h-[60px]">문제가 로딩 중입니다.</div>
                
                <div id="options-container" class="space-y-3 mb-6">
                    </div>

                <div id="explanation-area" class="hidden mb-6 p-5 bg-[#f0fdf4] border border-[#86efac] rounded-xl shadow-sm">
                    <div class="font-bold text-green-800 mb-2 flex items-center">
                        <span class="mr-2">💡</span> 정답 및 해설
                    </div>
                    <p id="explanation-text" class="text-green-900 text-sm md:text-base leading-relaxed font-medium"></p>
                </div>

                <div class="flex justify-between mt-auto pt-6 border-t border-gray-100">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-5 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed">이전 문제</button>
                    <div class="flex gap-2">
                        <button id="check-ans-btn" onclick="checkAnswer()" class="hidden px-6 py-3 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-colors">정답 확인</button>
                        <button id="next-btn" onclick="nextQuestion()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md transition-colors">다음 문제</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden p-8 text-center flex-1">
            <div id="result-badge" class="w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner">
                🏆
            </div>
            <h2 id="result-status" class="text-3xl font-bold mb-2">결과</h2>
            <div id="result-score" class="text-6xl font-extrabold text-blue-600 mb-4 tracking-tighter">00점</div>
            <div id="result-detail" class="text-gray-500 text-lg mb-8 font-medium">40문제 중 0문제를 맞히셨습니다.</div>
            
            <div class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
                <button onclick="location.reload()" class="flex-1 py-4 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 shadow-md transition-colors">초기화 및 홈으로</button>
                <button onclick="toggleReview()" class="flex-1 py-4 bg-blue-100 text-blue-800 rounded-xl font-bold hover:bg-blue-200 shadow-md transition-colors">상세 오답 노트</button>
            </div>
